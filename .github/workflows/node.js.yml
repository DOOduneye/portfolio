# Builds the static site and deploys it to the gh-pages branch for GitHub Pages.

name: Deploy to GitHub Pages

on:
  push:
    branches: [v1]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 16
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm run export
      - run: touch ./out/.nojekyll
      - run: cp CNAME ./out/CNAME

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
